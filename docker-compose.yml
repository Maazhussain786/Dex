services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dex
      POSTGRES_USER: dex
      POSTGRES_PASSWORD: dex
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dex -d dex"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/dex_password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DEX_ENV: development
      DEX_LOG_LEVEL: INFO
      DEX_API_HOST: 0.0.0.0
      DEX_API_PORT: 8000
      DEX_CORS_ORIGINS: http://localhost:3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: dex
      POSTGRES_USER: dex
      POSTGRES_PASSWORD: dex
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: dex_password
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
  neo4j-data:
  qdrant-data:
